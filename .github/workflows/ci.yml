# DeskCalendar CI（v1.0，见 docs/100-Release/CI.md）
# 触发：push/PR → main；tag → v* 触发 Release 发布。
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# 最小权限：默认无权限；仅 release job 需 contents:write 上传 GitHub Release（N2 收口，避免 lint/test/build 三 job 过宽授权）。
permissions: {}

# 零 CGO 贯穿全链路（ADR-06）：lint/test/build 均不编译 cgo 依赖（goffi/wgpu），
# 与构建期 CGO_ENABLED=0 一致，避免 Linux runner 默认 CGO=1 编译传递 cgo 包导致失败。
# R1 修复后 go.mod 已直连 GitHub 真实语义化版本（gg/systray/goffi/signals/lunar-go 等），
# 并删除 vendor/；故不再强制 -mod=vendor，依赖经 go.sum + GOPROXY 从模块代理拉取（B1 方案已废弃）。
env:
  CGO_ENABLED: "0"
  GOPROXY: "https://proxy.golang.org,direct"

jobs:
  # ── lint：go vet（零 CGO 静态检查，官方标准质量门）──
  # 原 golangci-lint 方案已停用：golangci/golangci-lint-action@v6 的 latest 仅解析到
  # v1.64.8（基于 go1.24 构建），无法分析 go 1.25 模块（报 "go1.24 < 1.25.0" 拒载配置）；
  # golangci-lint v2 虽基于更新 Go，但其配置格式（v2）与项目现有 .golangci.yml（v1 格式：
  # run.skip-files / linters-settings.errcheck.exclude-functions 等）不兼容，且会引入额外
  # lint 规则需在代码中逐一修复。当前以官方 go vet 作为质量门（已验证 CGO=0 全绿）。
  # 后续如需更强检查（errcheck/staticcheck/revive 等），再升级到 golangci-lint v2 并迁移
  # .golangci.yml 到 v2 格式。
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...

  # ── test：go test -coverprofile（零 CGO 下 -race 不可用；并发安全靠单写者+通道设计保证，见 ADR-06）──
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (coverage)
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  # ── build：windows 双架构矩阵（CGO_ENABLED=0），上传 artifact ──
  build:
    name: build (${{ matrix.arch }})
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build windows exe (${{ matrix.arch }})
        run: ./scripts/ci-build.sh ${{ matrix.arch }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskcalendar-${{ matrix.arch }}
          path: dist/deskcalendar-${{ matrix.arch }}.exe

  # ── release：仅 tag v* 触发，复用 build 产物打包后上传 GitHub Release（S4：不再重编译）──
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deskcalendar-*
          path: dist
          merge-multiple: true
      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis
      - name: Package (portable + installer + sha256)
        run: |
          ./scripts/package.sh amd64
          ./scripts/package.sh arm64
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deskcalendar-amd64.exe
            dist/deskcalendar-arm64.exe
            dist/DeskCalendar-Setup-amd64.exe
            dist/DeskCalendar-Setup-arm64.exe
            dist/DeskCalendar-Portable-amd64.zip
            dist/DeskCalendar-Portable-arm64.zip
            dist/sha256.txt
          generate_release_notes: true
